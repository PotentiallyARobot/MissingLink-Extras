<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MissingLink · Camera Studio</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="https://www.missinglink.build/logo.png">
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="app-header">
    <img src="https://www.missinglink.build/logo.png" alt="" onerror="this.style.display='none'">
    <h1>CAMERA <span>STUDIO</span></h1>
    <div class="hdr-right">
        <div class="hdr-badge" id="connBadge"><div class="dot" id="connDot"></div><span id="connLabel">Connecting</span></div>
        <button class="hdr-btn" id="btnGpu" onclick="toggleHW()">⚡ GPU</button>
        <button class="hdr-btn" id="btnConsole" onclick="toggleConsole()">▸ Console</button>
    </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sec">
        <div class="sec-label"><span class="icon">📁</span> IMAGES</div>
        <div class="dropzone" id="dropzone">
            <input type="file" accept="image/*" id="fileInput">
            <div class="dz-text">Drop images or <b>browse</b></div>
        </div>
        <div class="thumb-strip" id="thumbs"></div>
    </div>

    <div class="sec">
        <div class="sec-label"><span class="icon">🎥</span> CAMERA POSE</div>
        <div class="field"><label>Azimuth</label>
            <select id="selAz" onchange="syncFromDropdowns()">
                <option value="front view">Front (0°)</option><option value="front-right quarter view">Front-Right (45°)</option>
                <option value="right side view">Right (90°)</option><option value="back-right quarter view">Back-Right (135°)</option>
                <option value="back view">Back (180°)</option><option value="back-left quarter view">Back-Left (225°)</option>
                <option value="left side view">Left (270°)</option><option value="front-left quarter view">Front-Left (315°)</option>
            </select>
        </div>
        <div class="field"><label>Elevation</label>
            <select id="selEl" onchange="syncFromDropdowns()">
                <option value="low-angle shot">Low Angle (-30°)</option><option value="eye-level shot" selected>Eye Level (0°)</option>
                <option value="elevated shot">Elevated (20°)</option><option value="high-angle shot">High Angle (45°)</option>
            </select>
        </div>
        <div class="field"><label>Distance</label>
            <select id="selDist" onchange="syncFromDropdowns()">
                <option value="close-up">Close-up</option><option value="medium shot" selected>Medium Shot</option><option value="wide shot">Wide Shot</option>
            </select>
        </div>
    </div>

    <div class="sec">
        <div class="sec-label"><span class="icon">⚙️</span> SETTINGS</div>
        <div class="slider-row"><span class="sl">Seed</span><input type="range" id="rngSeed" min="0" max="2147483647" value="42" oninput="$('vSeed').textContent=this.value"><span class="sv" id="vSeed">42</span></div>
        <label class="check-row"><input type="checkbox" id="chkRand" checked> Randomize Seed</label>
        <div class="slider-row"><span class="sl">CFG</span><input type="range" id="rngCfg" min="1" max="10" value="1" step="0.5" oninput="$('vCfg').textContent=this.value"><span class="sv" id="vCfg">1</span></div>
        <div class="slider-row"><span class="sl">Steps</span><input type="range" id="rngSteps" min="1" max="20" value="4" oninput="$('vSteps').textContent=this.value"><span class="sv" id="vSteps">4</span></div>
        <div class="slider-row"><span class="sl">LoRA</span><input type="range" id="rngLora" min="0" max="1.5" value="0.9" step="0.05" oninput="$('vLora').textContent=this.value"><span class="sv" id="vLora">0.9</span></div>
    </div>

    <div class="sec">
        <div class="sec-label"><span class="icon">⚡</span> MODEL</div>
        <div class="field"><label>GGUF Variant</label>
            <select id="selVariant"><option value="Q4_K_M" selected>Q4_K_M</option><option value="Q2_K">Q2_K</option><option value="Q8_0">Q8_0</option></select>
        </div>
        <button class="load-btn" id="btnLoad" onclick="loadModel()">LOAD MODEL</button>
    </div>

    <div class="sec">
        <button class="gen-btn" id="btnGen" onclick="doGenerate()" disabled>⚡ GENERATE</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <canvas id="viewport-canvas"></canvas>
    <div class="prompt-bar">
        <input class="prompt-input" id="promptInput" value="<sks> front view eye-level shot medium shot" spellcheck="false">
        <span class="prompt-lock" id="promptLock" onclick="toggleLock()" title="Lock prompt (camera won't overwrite)">🔓</span>
    </div>
    <div class="output-area" id="outputArea">
        <span class="out-placeholder" id="outPh">Upload an image and generate</span>
        <img id="outImg" style="display:none">
        <div class="gen-overlay" id="genOverlay">
            <div class="gen-spinner"></div>
            <div class="gen-bar"><div class="gen-fill" id="genFill"></div></div>
            <div class="gen-text" id="genText">Generating...</div>
        </div>
    </div>
    <div class="result-bar" id="resultBar"></div>
</div>

<!-- HW Panel -->
<div class="hw-panel" id="hwPanel">
    <div class="hw-title"><span class="icon">⚡</span> HARDWARE MONITOR</div>
    <div class="hw-row"><span class="hl">VRAM</span><span class="hv" id="hwVram">—</span></div>
    <div class="hw-bar"><div class="gold" id="hwVramBar" style="width:0"></div></div>
    <div class="hw-row"><span class="hl">GPU</span><span class="hv" id="hwGpu">—</span></div>
</div>

<!-- CONSOLE -->
<div class="console" id="consoleDrawer">
    <div class="console-tabs">
        <button class="console-tab active">System</button>
        <button class="console-tab">Job Log</button>
    </div>
    <div class="console-body" id="consoleBody"></div>
    <div class="gpu-info" id="gpuInfo"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/static/viewport.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
